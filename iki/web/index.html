<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Industrial Knowledge Copilot</title>
<style>
  :root {
    --bg: #191B1D; --panel: #212426; --panel-2: #2D3134; --line: #40464A;
    --text: #F1F2F3; --muted: #A5ABB1; --accent: #5F7DEF; --accent-2: #21C09D;
    --hi: #24C45E; --med: #FCB100; --lo: #F65E78; --user: #2D3134;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 14px 16px calc(env(safe-area-inset-top) + 14px);
    background: linear-gradient(135deg, #16212e, #1d2b3a);
    border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px;
  }
  header .logo {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    background: linear-gradient(135deg, var(--accent), #ff5e62);
    display: grid; place-items: center; font-weight: 800; color: #1a1209;
  }
  header h1 { font-size: 16px; margin: 0; line-height: 1.1; }
  header .sub { font-size: 11px; color: var(--muted); }
  header .stat { margin-left: auto; font-size: 11px; color: var(--muted); text-align: right; }

  .docrow { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .docrow .dtitle { font-weight: 600; font-size: 14px; flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .docrow .dbadge { font-size: 10.5px; color: var(--muted); border: 1px solid var(--line);
    padding: 2px 8px; border-radius: 999px; text-transform: capitalize; flex: none; }
  .docrow .dchunks { font-size: 12px; color: var(--accent-2); flex: none; }
  .docrow .dpath { font-size: 11px; color: var(--muted); width: 100%; margin-top: 2px;
    word-break: break-all; }

  .etag { display: inline-block; margin: 3px 6px 3px 0; padding: 6px 13px; border-radius: 999px;
    font-size: 13px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line);
    color: var(--accent-2); }
  .etag:hover { border-color: var(--accent-2); }
  .etag.center { background: var(--accent); color: #0d1116; border-color: var(--accent); font-weight: 700; }
  .esection { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-top: 4px; }
  .estat { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }

  .filters { display: flex; gap: 6px; overflow-x: auto; padding: 10px 12px;
    border-bottom: 1px solid var(--line); background: var(--panel); scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }

  .tabbar { display: flex; gap: 4px; padding: 10px 12px 0; background: var(--panel);
    border-bottom: 1px solid var(--line); }
  .tab { font-size: 13px; font-weight: 600; color: var(--muted); background: transparent;
    border: none; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tabpanel { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .tabpanel.active { display: flex; }  

  .chip { white-space: nowrap; font-size: 12px; padding: 6px 11px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--muted); background: transparent; cursor: pointer; }
  .chip.active { color: #08121c; background: var(--accent-2); border-color: var(--accent-2); font-weight: 600; }

  #chat { flex: 1; overflow-y: auto; padding: 16px 12px 8px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 92%; }
  .msg.user { align-self: flex-end; background: var(--accent-2); color: #07131f;
    padding: 9px 13px; border-radius: 14px 14px 4px 14px; font-size: 15px; }
  .msg.bot { align-self: flex-start; width: 100%; }
  .bubble { background: var(--panel); border: 1px solid var(--line); border-radius: 4px 14px 14px 14px;
    padding: 13px 14px; font-size: 15px; line-height: 1.5; }
  .answer cite { font-style: normal; color: var(--accent); font-weight: 700; cursor: pointer; }

  .conf { display: inline-flex; align-items: center; gap: 6px; font-size: 11px;
    margin-top: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
  .conf.high { background: rgba(54,211,153,.15); color: var(--hi); }
  .conf.medium { background: rgba(251,191,36,.15); color: var(--med); }
  .conf.low, .conf.none { background: rgba(248,113,113,.15); color: var(--lo); }

  .actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .action { font-size: 12.5px; color: var(--text); background: var(--panel-2);
    border-left: 3px solid var(--accent); padding: 7px 10px; border-radius: 4px; }

  .cites { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .cites h4 { margin: 0 0 2px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .cite { background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; }
  .cite .top { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .cite .num { flex: none; width: 20px; height: 20px; border-radius: 5px; background: var(--accent);
    color: #1a1209; display: grid; place-items: center; font-weight: 800; font-size: 11px; }
  .cite .title { font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cite .badge { margin-left: auto; flex: none; font-size: 10px; color: var(--muted); border: 1px solid var(--line);
    padding: 1px 6px; border-radius: 999px; text-transform: capitalize; }
  .cite .snippet { font-size: 12.5px; color: var(--muted); margin-top: 6px; line-height: 1.45; }
  .cite .meta { font-size: 11px; color: var(--accent-2); margin-top: 6px; word-break: break-all; }
  .tag-link { color: var(--accent-2); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  .tag-link:hover { color: var(--accent); }
  .warn { margin-top: 10px; font-size: 12px; color: var(--med); background: rgba(251,191,36,.08);
    border-radius: 6px; padding: 7px 10px; }

  .empty { color: var(--muted); text-align: center; margin: 28px 14px; font-size: 14px; line-height: 1.6; }
  .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
  .example { font-size: 12.5px; color: var(--accent-2); border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 12px; cursor: pointer; background: var(--panel); }

  footer { border-top: 1px solid var(--line); background: var(--panel);
    padding: 10px 12px calc(env(safe-area-inset-bottom) + 10px); display: flex; gap: 8px; }
  #q { flex: 1; background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 12px; padding: 12px 14px; font-size: 16px; outline: none; }
  #send { flex: none; background: var(--accent); color: #1a1209; border: none; border-radius: 12px;
    padding: 0 16px; font-weight: 700; font-size: 15px; cursor: pointer; }
  #send:disabled { opacity: .5; }
  .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay: .2s } .typing span:nth-child(3){ animation-delay: .4s }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
</style>
</head>
<body>
  <header>
    <div class="logo">IK</div>
    <div>
      <h1>Industrial Knowledge Copilot</h1>
      <div class="sub">Ask anything about your plant — answers with sources</div>
    </div>
    <div class="stat" id="stat">…</div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="tabbar">
    <button class="tab active" data-tab="ask">Ask</button>
    <button class="tab" data-tab="explorer">Equipment Explorer</button>
    <button class="tab" data-tab="documents">Documents</button>
  </div>

  <div class="tabpanel active" id="tab-ask">
    <div class="filters" id="filters"></div>
    <div id="chat">
      <div class="empty" id="empty">
        Ask about equipment, maintenance history, procedures, inspections or compliance.
        Every answer is grounded in your documents with citations and a confidence score.
        <div class="examples" id="examples"></div>
      </div>
    </div>
    <footer>
      <input id="q" placeholder="e.g. Why does pump P-101A keep tripping?" autocomplete="off" />
      <button id="send">Ask</button>
    </footer>
  </div>

  <div class="tabpanel" id="tab-explorer">
    <div style="padding:16px; overflow-y:auto;">
      <div style="display:flex; gap:8px; margin-bottom:14px;">
        <input id="etag-input" placeholder="Enter an equipment tag, e.g. P-101A" autocomplete="off"
          style="flex:1; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
                 border-radius:10px; padding:11px 14px; font-size:14px; outline:none;" />
        <button id="etag-search" style="background:var(--accent); color:#0d1116; border:none;
                 border-radius:10px; padding:0 18px; font-weight:700; cursor:pointer;">Explore</button>
      </div>
      <div id="etag-quickpicks" style="margin-bottom:16px;"></div>
      <div id="etag-results"></div>
    </div>
  </div>

  <div class="tabpanel" id="tab-documents">
    <div style="padding:16px; overflow-y:auto;">
      <div id="doc-list" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>
  </div>

<script>
const api = (p, opts) => fetch(p, opts).then(r => r.json());
let activeType = null;

let tagsLoaded = false;

async function loadExplorerTags() {
  if (tagsLoaded) return;
  const { tags } = await api('/api/equipment_tags');
  const el = document.getElementById('etag-quickpicks');
  el.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;">Known equipment</div>`;
  tags.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'etag'; chip.textContent = t;
    chip.onclick = () => exploreTag(t);
    el.appendChild(chip);
  });
  tagsLoaded = true;
}

let docsLoaded = false;

async function loadDocuments() {
  if (docsLoaded) return;
  const { documents } = await api('/api/documents');
  const el = document.getElementById('doc-list');
  el.innerHTML = '';
  documents.forEach(d => {
    const row = document.createElement('div');
    row.className = 'docrow';
    row.style.flexWrap = 'wrap';
    row.innerHTML = `
      <div class="dtitle">${escapeHtml(d.title)}</div>
      <div class="dbadge">${TYPE_LABELS[d.doc_type] || d.doc_type}</div>
      <div class="dchunks">${d.chunks} chunks</div>
      <div class="dpath">${escapeHtml(d.source_path)}</div>
    `;
    el.appendChild(row);
  });
  docsLoaded = true;
}

async function exploreTag(tag) {
  document.getElementById('etag-input').value = tag;
  const results = document.getElementById('etag-results');
  results.innerHTML = `<div style="color:var(--muted);font-size:13px;">Loading ${escapeHtml(tag)}…</div>`;
  try {
    const info = await api(`/api/equipment/${encodeURIComponent(tag)}`);
    renderExplorerResult(info);
  } catch (e) {
    results.innerHTML = `<div style="color:var(--muted);font-size:13px;">Couldn't find that tag.</div>`;
  }
}

function renderExplorerResult(info) {
  const results = document.getElementById('etag-results');
  if (info.mention_count === 0) {
    results.innerHTML = `<div style="color:var(--muted);font-size:13px;">No mentions of "${escapeHtml(info.tag)}" found.</div>`;
    return;
  }
  let html = `<div class="esection">`;
  html += `<div class="estat"><b style="color:var(--text);font-size:15px;">${escapeHtml(info.tag)}</b><br>
    Mentioned ${info.mention_count} times across: ${info.doc_types.map(t => TYPE_LABELS[t]||t).join(', ')}</div>`;
  html += `<div><span class="etag center">${escapeHtml(info.tag)}</span>`;
  (info.related_tags || []).forEach(t => html += `<span class="etag" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`);
  html += `</div></div>`;
  if (info.answer) {
    html += `<div class="esection" style="margin-top:12px;"><div class="answer">${linkifyCitations(escapeHtml(info.answer.answer))}</div></div>`;
  }
  results.innerHTML = html;
  results.querySelectorAll('.etag[data-tag]').forEach(e => e.onclick = () => exploreTag(e.dataset.tag));
}

document.getElementById('etag-search').onclick = () => {
  const v = document.getElementById('etag-input').value.trim();
  if (v) exploreTag(v);
};
document.getElementById('etag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('etag-search').click();
});

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tabpanel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  if (name === 'explorer') loadExplorerTags();
  if (name === 'documents') loadDocuments();
}
document.querySelectorAll('.tab').forEach(btn => btn.onclick = () => switchTab(btn.dataset.tab));



const TYPE_LABELS = {
  engineering_drawing: "Drawings", maintenance_record: "Maintenance",
  safety_procedure: "Safety", inspection_report: "Inspection",
  operating_instruction: "Operating", project_file: "Project",
  regulatory_submission: "Regulatory", other: "Other"
};

const EXAMPLES = [
  "Why does pump P-101A keep tripping?",
  "What is the LOTO procedure for the cooling water system?",
  "When is the next inspection due for vessel V-201?",
  "What does line CW-6-101 carry and where does it go?"
];

async function boot() {
  const h = await api('/api/health');
  document.getElementById('stat').textContent =
    `${h.documents} docs · ${h.chunks} chunks\n${h.embedder}`;
  document.getElementById('stat').style.whiteSpace = 'pre';

  const f = document.getElementById('filters');
  const all = document.createElement('button');
  all.className = 'chip active'; all.textContent = 'All sources';
  all.onclick = () => setType(null, all);
  f.appendChild(all);
  const dt = await api('/api/doc_types');
  dt.doc_types.forEach(t => {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = TYPE_LABELS[t] || t;
    c.onclick = () => setType(t, c);
    f.appendChild(c);
  });

  const ex = document.getElementById('examples');
  EXAMPLES.forEach(t => {
    const e = document.createElement('div');
    e.className = 'example'; e.textContent = t;
    e.onclick = () => { document.getElementById('q').value = t; ask(); };
    ex.appendChild(e);
  });
}

function setType(t, el) {
  activeType = t;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

const chat = document.getElementById('chat');
function scroll() { chat.scrollTop = chat.scrollHeight; }

function addUser(text) {
  const e = document.getElementById('empty'); if (e) e.remove();
  const m = document.createElement('div'); m.className = 'msg user'; m.textContent = text;
  chat.appendChild(m); scroll();
}

function addTyping() {
  const m = document.createElement('div'); m.className = 'msg bot'; m.id = 'typing';
  m.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(m); scroll(); return m;
}

function linkifyCitations(text) {
  return text.replace(/\[(\d+)\]/g, '<cite data-n="$1">[$1]</cite>');
}

function render(ans) {
  const m = document.createElement('div'); m.className = 'msg bot';
  const conf = ans.confidence_label || 'none';
  const pct = Math.round((ans.confidence || 0) * 100);
  let html = `<div class="bubble">`;
  html += `<div class="answer">${linkifyCitations(escapeHtml(ans.answer))}</div>`;
  html += `<span class="conf ${conf}">● ${conf.toUpperCase()} confidence · ${pct}%</span>`;

  if (ans.suggested_actions && ans.suggested_actions.length) {
    html += `<div class="actions">`;
    ans.suggested_actions.forEach(a => html += `<div class="action">▸ ${escapeHtml(a)}</div>`);
    html += `</div>`;
  }
  (ans.warnings || []).forEach(w => html += `<div class="warn">⚠ ${escapeHtml(w)}</div>`);

  if (ans.citations && ans.citations.length) {
    html += `<div class="cites"><h4>Sources</h4>`;
    ans.citations.forEach((c, i) => {
      const tagList = (c.metadata && c.metadata.equipment_tags) ? c.metadata.equipment_tags.slice(0,6) : [];
      const tags = tagList.map(t => `<span class="tag-link" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join(' ');
      html += `<div class="cite" id="cite-${i+1}">
        <div class="top"><span class="num">${i+1}</span>
          <span class="title">${escapeHtml(c.title)}</span>
          <span class="badge">${(TYPE_LABELS[c.doc_type]||c.doc_type)}</span></div>
        <div class="snippet">${escapeHtml(c.snippet)}</div>
        <div class="meta">${escapeHtml(c.source_path)} · match ${Math.round(c.score*100)}%${tags ? ' · tags: '+tags : ''}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  m.innerHTML = html;
  m.querySelectorAll('cite').forEach(el => el.onclick = () => {
    
    const t = document.getElementById('cite-' + el.dataset.n);
    if (t) { t.scrollIntoView({behavior:'smooth', block:'center'});
             t.style.outline = '2px solid var(--accent)';
             setTimeout(()=>t.style.outline='none', 1200); }
  });
  m.querySelectorAll('.tag-link').forEach(el => el.onclick = () => {
    switchTab('explorer'); loadExplorerTags(); exploreTag(el.dataset.tag);
  });
  chat.appendChild(m); scroll();
}



function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function ask() {
  const input = document.getElementById('q');
  const text = input.value.trim(); if (!text) return;
  input.value = ''; addUser(text);
  const btn = document.getElementById('send'); btn.disabled = true;
  const typing = addTyping();
  try {
    const body = { query: text };
    if (activeType) body.doc_types = [activeType];
    const ans = await api('/api/query', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    typing.remove(); render(ans);
  } catch (e) {
    typing.remove();
    const m = document.createElement('div'); m.className='msg bot';
    m.innerHTML = `<div class="bubble">Sorry — something went wrong reaching the Copilot.</div>`;
    chat.appendChild(m);
  } finally { btn.disabled = false; }
}

document.getElementById('send').onclick = ask;
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
boot();
</script>
</body>
</html>
